<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberTrade | Analytics</title>
<link rel="stylesheet" href="static/fonts/inter/400.css" />
<link rel="stylesheet" href="static/fonts/inter/500.css" />
<link rel="stylesheet" href="static/fonts/inter/600.css" />
<link rel="stylesheet" href="static/fonts/inter/700.css" />
<link rel="stylesheet" href="static/fonts/jetbrains-mono/400.css" />
<link rel="stylesheet" href="static/fonts/jetbrains-mono/500.css" />
<link rel="stylesheet" href="static/css/app.css" />
<script src="static/vendor/plotly.min.js"></script>
</head>
<body class="font-body-base bg-background text-on-surface">

<div id="app-topnav"></div>
<div id="app-sidebar"></div>

<main class="md:ml-64 pt-xl min-h-screen px-md pb-md">
  <div class="max-w-6xl mx-auto pt-lg space-y-xl">

    <div class="border-l-4 border-primary-fixed pl-md">
      <h1 class="text-headline-md font-headline-md text-on-surface">Analytics</h1>
      <p class="text-label-mono font-label-mono text-on-surface-variant/60">Portfolio growth, profit &amp; loss, and trading activity</p>
    </div>

    <!-- Summary stat cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-gutter">
      <div class="glass-card rounded-xl p-md">
        <p class="text-label-mono font-label-mono text-on-surface-variant/60 uppercase">Total Invested</p>
        <p id="stat-total-capital" class="text-data-lg font-data-lg text-on-surface mt-xs">$--</p>
      </div>
      <div class="glass-card rounded-xl p-md">
        <p class="text-label-mono font-label-mono text-on-surface-variant/60 uppercase">Total Profit / Loss</p>
        <p id="stat-total-profit" class="text-data-lg font-data-lg text-primary-fixed mt-xs">$--</p>
      </div>
      <div class="glass-card rounded-xl p-md">
        <p class="text-label-mono font-label-mono text-on-surface-variant/60 uppercase">Win Rate</p>
        <p id="stat-win-rate" class="text-data-lg font-data-lg text-on-surface mt-xs">--%</p>
      </div>
    </div>

    <!-- Portfolio growth -->
    <section class="glass-card rounded-2xl p-md md:p-lg">
      <h2 class="text-headline-md-mobile font-headline-md-mobile text-on-surface mb-md">Portfolio Growth</h2>
      <div id="growth-chart" style="width:100%; height:320px;"></div>
    </section>

    <!-- Profit / loss per position -->
    <section class="glass-card rounded-2xl p-md md:p-lg">
      <h2 class="text-headline-md-mobile font-headline-md-mobile text-on-surface mb-md">Profit / Loss by Position</h2>
      <div id="pl-chart" style="width:100%; height:320px;"></div>
    </section>

    <!-- Recent transactions summary -->
    <section class="glass-card rounded-2xl overflow-hidden">
      <h2 class="text-headline-md-mobile font-headline-md-mobile text-on-surface p-md md:p-lg pb-0">Recent Transactions</h2>
      <div class="overflow-x-auto terminal-scroll p-md md:p-lg pt-md">
        <table class="w-full text-left">
          <thead>
            <tr class="border-b border-white/10 text-label-mono font-label-mono text-on-surface-variant/60 uppercase text-xs">
              <th class="px-md py-sm">Symbol</th>
              <th class="px-md py-sm">Date</th>
              <th class="px-md py-sm">Invested</th>
              <th class="px-md py-sm">P/L</th>
            </tr>
          </thead>
          <tbody id="analytics-tbody">
            <tr><td colspan="4" class="px-md py-lg text-center text-on-surface-variant/50 font-label-mono">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="text-center pb-lg">
        <a href="history.html" class="text-primary-fixed font-label-mono text-label-mono hover:underline">View full history →</a>
      </div>
    </section>

  </div>
</main>

<div id="app-mobilenav"></div>

<script type="module" src="static/js/analytics.js"></script>
</body>
</html>
